<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mandala Art · demo.shireesh.com</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.3/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e0d8ff;
    }
    h1 {
      font-size: clamp(1rem, 3vw, 1.6rem);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-bottom: 1rem;
      opacity: 0.75;
    }
    canvas { display: block; border-radius: 50%; }
    p.hint {
      margin-top: 1rem;
      font-size: 0.78rem;
      opacity: 0.45;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <h1>Mandala Art</h1>
  <div id="sketch-container"></div>
  <p class="hint">Move your mouse · Click to change palette</p>

  <script>
    new p5(function (p) {
      // ── Colour palettes ─────────────────────────────────────────────────────
      const PALETTES = [
        ['#ff6b9d','#c44dff','#4d79ff','#4dffee','#ffe94d'],
        ['#ff4500','#ff8c00','#ffd700','#adff2f','#00fa9a'],
        ['#00bfff','#7b68ee','#da70d6','#ff69b4','#fffacd'],
        ['#e63946','#457b9d','#a8dadc','#f1faee','#ffd166'],
        ['#f72585','#7209b7','#3a0ca3','#4361ee','#4cc9f0'],
      ];

      let paletteIdx = 0;
      let palette    = PALETTES[paletteIdx];
      let t          = 0;
      let SIZE;

      // ── Setup ────────────────────────────────────────────────────────────────
      p.setup = function () {
        SIZE = Math.min(p.windowWidth, p.windowHeight) * 0.85;
        const cnv = p.createCanvas(SIZE, SIZE);
        cnv.parent('sketch-container');
        p.angleMode(p.RADIANS);
        p.colorMode(p.HSB, 360, 100, 100, 100);
        p.frameRate(60);
      };

      // ── Draw ─────────────────────────────────────────────────────────────────
      p.draw = function () {
        p.background(260, 25, 5, 22);
        p.translate(SIZE / 2, SIZE / 2);

        const mx = (p.mouseX - SIZE / 2) / (SIZE / 2);
        const my = (p.mouseY - SIZE / 2) / (SIZE / 2);
        const influence = p.constrain(p.sqrt(mx * mx + my * my), 0, 1);

        drawMandala(t, influence);
        t += 0.007;
      };

      // ── Configuration ────────────────────────────────────────────────────────
      const BASE_SYM = 8;  // 8-fold symmetry throughout
      // Ring radii as fractions of the outer radius R, innermost first
      const R_FRACS  = [0.11, 0.22, 0.35, 0.50, 0.65, 0.80, 0.94];
      // Drawing style for each ring
      const STYLES   = ['innerBloom', 'diamonds', 'petals', 'arcs', 'lotus', 'petals', 'scallop'];

      // ── Utility: hex → [h, s, b] ──────────────────────────────────────────────
      function hexToHSB(hex) {
        const r = parseInt(hex.slice(1, 3), 16) / 255;
        const g = parseInt(hex.slice(3, 5), 16) / 255;
        const b = parseInt(hex.slice(5, 7), 16) / 255;
        const mx = Math.max(r,g,b), mn = Math.min(r,g,b), d = mx - mn;
        let h = 0;
        if (d !== 0) {
          if (mx === r) h = 60 * (((g - b) / d) % 6);
          else if (mx === g) h = 60 * ((b - r) / d + 2);
          else               h = 60 * ((r - g) / d + 4);
        }
        if (h < 0) h += 360;
        return [h, mx === 0 ? 0 : (d / mx) * 100, mx * 100];
      }

      // Compute animated HSB for a given layer index
      function layerHSB(idx, time, influence) {
        const [h, s, v] = hexToHSB(palette[idx % palette.length]);
        return [
          (h + time * 28 + influence * 45) % 360,
          p.constrain(s + 12 * p.sin(time * 0.7 + idx), 65, 100),
          p.constrain(v + 18, 70, 100),
        ];
      }

      // ── Core mandala renderer ─────────────────────────────────────────────────
      function drawMandala(time, influence) {
        const R = SIZE * 0.46;

        // Draw concentric guide circles (very subtle)
        p.noFill();
        for (let i = 0; i < R_FRACS.length; i++) {
          const [h, s, v] = layerHSB(i, time, influence);
          p.stroke(h, s * 0.4, v * 0.45, 22);
          p.strokeWeight(0.5);
          p.ellipse(0, 0, R * R_FRACS[i] * 2, R * R_FRACS[i] * 2);
        }

        // Draw rings outermost → innermost so inner layers render on top
        for (let i = R_FRACS.length - 1; i >= 0; i--) {
          const outerR = R * R_FRACS[i];
          const innerR = i > 0 ? R * R_FRACS[i - 1] : 0;
          const [h, s, v] = layerHSB(i, time, influence);

          const rotDir   = i % 2 === 0 ? 1 : -1;
          const rotSpeed = 0.20 + 0.04 * i;

          p.push();
          p.rotate(time * rotDir * rotSpeed);
          p.stroke(h, s, v, 82);
          p.strokeWeight(0.7 + 0.25 * (i / R_FRACS.length));
          p.fill(h, s * 0.85, v * 0.78, 42);

          const sym = BASE_SYM * (i % 2 === 0 ? 1 : 2);

          switch (STYLES[i]) {
            case 'innerBloom': drawInnerBloom(outerR, h, s, v);             break;
            case 'diamonds':   drawDiamondRing(outerR, innerR, sym);        break;
            case 'petals':     drawFilledPetalRing(outerR, innerR, sym);    break;
            case 'arcs':       drawArcSegmentRing(outerR, innerR, sym);     break;
            case 'lotus':      drawLotusRing(outerR, innerR, sym);          break;
            case 'scallop':    drawScallopRing(outerR, innerR, sym);        break;
          }

          p.pop();
        }

        // Centre jewel
        const [ch, cs, cv] = layerHSB(0, time, influence);
        p.noStroke();
        p.fill(ch, cs, cv, 90);
        p.ellipse(0, 0, SIZE * 0.026, SIZE * 0.026);
        p.fill(0, 0, 100, 100);
        p.ellipse(0, 0, SIZE * 0.010, SIZE * 0.010);
      }

      // ── Shared helper: smooth pointed petal ──────────────────────────────────
      // Petal extends from innerR to outerR along the +x axis,
      // width envelope follows sin(f·π) so both tips are pointed.
      function petalShape(innerR, outerR, maxHalfAngle) {
        const steps = 36;
        p.beginShape();
        // right side inner→outer
        for (let i = 0; i <= steps; i++) {
          const f = i / steps;
          const r = innerR + (outerR - innerR) * f;
          const a = maxHalfAngle * Math.sin(f * p.PI);
          p.vertex(Math.cos(a) * r, Math.sin(a) * r);
        }
        // left side outer→inner
        for (let i = steps; i >= 0; i--) {
          const f = i / steps;
          const r = innerR + (outerR - innerR) * f;
          const a = -maxHalfAngle * Math.sin(f * p.PI);
          p.vertex(Math.cos(a) * r, Math.sin(a) * r);
        }
        p.endShape(p.CLOSE);
      }

      // ── Ring drawing functions ────────────────────────────────────────────────

      // Innermost: 8 filled teardrop petals radiating from centre + inner disc
      function drawInnerBloom(outerR, h, s, v) {
        const sym = BASE_SYM;
        const halfA = (p.TWO_PI / sym) * 0.44;
        for (let i = 0; i < sym; i++) {
          p.push();
          p.rotate((p.TWO_PI / sym) * i);
          p.fill(h, s, v, 55);
          p.stroke(h, s, v, 88);
          petalShape(0, outerR * 0.93, halfA);
          p.pop();
        }
        // Small filled disc at very centre
        p.noStroke();
        p.fill(h, s * 0.6, v, 65);
        p.ellipse(0, 0, outerR * 0.38, outerR * 0.38);
      }

      // Diamond ring: radially-aligned diamonds evenly spaced on the ring
      function drawDiamondRing(outerR, innerR, sym) {
        const mid = (outerR + innerR) * 0.5;
        const hh  = (outerR - innerR) * 0.46;
        const hw  = (p.TWO_PI / sym) * 0.38 * mid;
        for (let s = 0; s < sym; s++) {
          const angle = (p.TWO_PI / sym) * s;
          const cx = Math.cos(angle) * mid,  cy = Math.sin(angle) * mid;
          const nx = Math.cos(angle),        ny = Math.sin(angle);
          const tx = -Math.sin(angle),       ty = Math.cos(angle);
          p.beginShape();
          p.vertex(cx + nx * hh,  cy + ny * hh);   // outer tip
          p.vertex(cx + tx * hw,  cy + ty * hw);   // right
          p.vertex(cx - nx * hh,  cy - ny * hh);   // inner tip
          p.vertex(cx - tx * hw,  cy - ty * hw);   // left
          p.endShape(p.CLOSE);
        }
      }

      // Filled petal ring: pointed-oval petals filling each sector
      function drawFilledPetalRing(outerR, innerR, sym) {
        const halfA = (p.TWO_PI / sym) * 0.42;
        for (let s = 0; s < sym; s++) {
          p.push();
          p.rotate((p.TWO_PI / sym) * s);
          petalShape(innerR * 1.04, outerR * 0.96, halfA);
          p.pop();
        }
      }

      // Arc segment ring: filled arc slices, like pie wedges on a donut
      function drawArcSegmentRing(outerR, innerR, sym) {
        const sectorA = p.TWO_PI / sym;
        const gap     = 0.032;
        for (let s = 0; s < sym; s++) {
          const startA = sectorA * s + gap;
          const endA   = sectorA * (s + 1) - gap;
          p.beginShape();
          for (let a = startA; a <= endA + 0.001; a += 0.035) {
            const aa = Math.min(a, endA);
            p.vertex(Math.cos(aa) * outerR, Math.sin(aa) * outerR);
          }
          for (let a = endA; a >= startA - 0.001; a -= 0.035) {
            const aa = Math.max(a, startA);
            p.vertex(Math.cos(aa) * innerR, Math.sin(aa) * innerR);
          }
          p.endShape(p.CLOSE);
        }
      }

      // Lotus ring: rounded petals with bulging tips
      function drawLotusRing(outerR, innerR, sym) {
        const halfA  = (p.TWO_PI / sym) * 0.44;
        const bulge  = (outerR - innerR) * 0.12;
        const steps  = 36;
        for (let s = 0; s < sym; s++) {
          p.push();
          p.rotate((p.TWO_PI / sym) * s);
          p.beginShape();
          // right half: inner→outer with outward bulge
          for (let i = 0; i <= steps; i++) {
            const f  = i / steps;
            const r  = innerR + (outerR - innerR) * f;
            const a  = halfA * Math.sin(f * Math.PI);
            const b  = bulge * Math.sin(f * Math.PI);
            p.vertex(Math.cos(a) * (r + b), Math.sin(a) * (r + b));
          }
          // left half: outer→inner
          for (let i = steps; i >= 0; i--) {
            const f  = i / steps;
            const r  = innerR + (outerR - innerR) * f;
            const a  = -halfA * Math.sin(f * Math.PI);
            const b  = bulge * Math.sin(f * Math.PI);
            p.vertex(Math.cos(a) * (r + b), Math.sin(a) * (r + b));
          }
          p.endShape(p.CLOSE);
          p.pop();
        }
      }

      // Scallop ring: outermost border with scalloped outer edge
      function drawScallopRing(outerR, innerR, sym) {
        const sectorA = p.TWO_PI / sym;
        for (let s = 0; s < sym; s++) {
          const startA = sectorA * s;
          const endA   = sectorA * (s + 1);
          const midA   = (startA + endA) * 0.5;
          p.beginShape();
          for (let a = startA; a <= endA + 0.001; a += 0.025) {
            const aa = Math.min(a, endA);
            // radius peaks at sector midpoint, dips at boundaries
            const env    = Math.cos((aa - midA) / sectorA * Math.PI);
            const radius = innerR + (outerR - innerR) * (0.55 + 0.45 * env);
            p.vertex(Math.cos(aa) * radius, Math.sin(aa) * radius);
          }
          for (let a = endA; a >= startA - 0.001; a -= 0.025) {
            const aa = Math.max(a, startA);
            p.vertex(Math.cos(aa) * innerR, Math.sin(aa) * innerR);
          }
          p.endShape(p.CLOSE);
        }
      }

      // ── Interaction ───────────────────────────────────────────────────────────
      p.mousePressed = function () {
        paletteIdx = (paletteIdx + 1) % PALETTES.length;
        palette = PALETTES[paletteIdx];
      };

      p.windowResized = function () {
        SIZE = Math.min(p.windowWidth, p.windowHeight) * 0.85;
        p.resizeCanvas(SIZE, SIZE);
      };
    });
  </script>
</body>
</html>
