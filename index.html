<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mandala Art · demo.shireesh.com</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.3/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e0d8ff;
    }
    h1 {
      font-size: clamp(1rem, 3vw, 1.6rem);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-bottom: 1rem;
      opacity: 0.75;
    }
    canvas { display: block; border-radius: 50%; }
    p.hint {
      margin-top: 1rem;
      font-size: 0.78rem;
      opacity: 0.45;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <h1>Mandala Art</h1>
  <div id="sketch-container"></div>
  <p class="hint">Move your mouse · Click to change palette</p>

  <script>
    new p5(function (p) {
      // ── Colour palettes ─────────────────────────────────────────────────────
      const PALETTES = [
        ['#ff6b9d','#c44dff','#4d79ff','#4dffee','#ffe94d'],
        ['#ff4500','#ff8c00','#ffd700','#adff2f','#00fa9a'],
        ['#00bfff','#7b68ee','#da70d6','#ff69b4','#fffacd'],
        ['#e63946','#457b9d','#a8dadc','#f1faee','#ffd166'],
        ['#f72585','#7209b7','#3a0ca3','#4361ee','#4cc9f0'],
      ];

      let paletteIdx = 0;
      let palette    = PALETTES[paletteIdx];
      let t          = 0;          // animation time
      let SIZE;                    // canvas diameter

      // ── Setup ────────────────────────────────────────────────────────────────
      p.setup = function () {
        SIZE = Math.min(p.windowWidth, p.windowHeight) * 0.85;
        const cnv = p.createCanvas(SIZE, SIZE);
        cnv.parent('sketch-container');
        p.angleMode(p.RADIANS);
        p.colorMode(p.HSB, 360, 100, 100, 100);
        p.noFill();
        p.strokeWeight(1);
        p.frameRate(60);
      };

      // ── Draw ─────────────────────────────────────────────────────────────────
      p.draw = function () {
        p.background(260, 20, 5, 18);   // slow fade trail
        p.translate(SIZE / 2, SIZE / 2);

        const mx = (p.mouseX - SIZE / 2) / (SIZE / 2);   // –1 … +1
        const my = (p.mouseY - SIZE / 2) / (SIZE / 2);
        const influence = p.constrain(p.sqrt(mx * mx + my * my), 0, 1);

        drawMandala(t, influence);
        t += 0.008;
      };

      // ── Core mandala renderer ─────────────────────────────────────────────────
      const LAYERS               = 6;
      const SYMMETRY             = 12;
      const PETAL_DIVISIONS      = 24;
      const INNER_DETAIL_POINTS  = 5;
      const CENTRAL_BLOOM_PETALS = 8;

      function drawMandala(time, influence) {
        const R        = SIZE * 0.46;       // outer radius
        const layers   = LAYERS;
        const symmetry = SYMMETRY;

        for (let layer = 0; layer < layers; layer++) {
          const frac      = (layer + 1) / layers;
          const baseR     = R * frac;
          const col       = palette[layer % palette.length];
          const hsbColor  = hexToHSB(col);
          const hue       = (hsbColor[0] + time * 30 + influence * 60) % 360;
          const bright    = 70 + 30 * frac;
          const sat       = 80 + 20 * p.sin(time + layer);

          p.stroke(hue, sat, bright, 80);
          p.strokeWeight(0.6 + frac * 0.8);

          for (let s = 0; s < symmetry; s++) {
            p.push();
            p.rotate((p.TWO_PI / symmetry) * s + time * (layer % 2 === 0 ? 0.4 : -0.3));

            drawPetal(baseR, time, layer, influence);
            drawInnerDetail(baseR, time, layer);

            p.pop();
          }
        }

        // Central bloom
        drawCentralBloom(time, influence);
      }

      // ── Petal / arc shape ─────────────────────────────────────────────────────
      function drawPetal(r, time, layer, influence) {
        const w  = p.TWO_PI / PETAL_DIVISIONS;  // angular width of petal
        const d  = 0.12 + 0.08 * influence;  // depth variation
        const fr = 1 + 0.18 * p.sin(time * 1.3 + layer * 0.7);

        p.beginShape();
        for (let a = -w; a <= w; a += 0.02) {
          const radial = r * fr * (1 + d * p.cos(a / w * p.PI));
          p.vertex(p.cos(a) * radial, p.sin(a) * radial);
        }
        p.endShape();

        // Spoke line
        p.line(0, 0, p.cos(0) * r * 0.5, p.sin(0) * r * 0.5);
      }

      // ── Inner dotted ring detail ───────────────────────────────────────────────
      function drawInnerDetail(r, time, layer) {
        const n    = INNER_DETAIL_POINTS;
        const off  = time * (layer % 2 === 0 ? 0.6 : -0.6);
        for (let i = 0; i < n; i++) {
          const a  = (p.TWO_PI / n) * i + off;
          const cr = r * 0.55;
          p.point(p.cos(a) * cr, p.sin(a) * cr);
        }
      }

      // ── Central bloom ─────────────────────────────────────────────────────────
      function drawCentralBloom(time, influence) {
        const petals = CENTRAL_BLOOM_PETALS;
        const maxR   = SIZE * 0.12 * (1 + 0.15 * p.sin(time * 2));

        for (let i = 0; i < petals; i++) {
          const angle = (p.TWO_PI / petals) * i + time * 0.5;
          const hue   = (200 + i * (360 / petals) + time * 40) % 360;
          p.stroke(hue, 90, 95, 90);
          p.strokeWeight(1.2);

          p.beginShape();
          for (let a = -0.3; a <= 0.3; a += 0.02) {
            const r = maxR * (1 + 0.5 * p.cos(a / 0.3 * p.HALF_PI));
            p.vertex(
              p.cos(angle + a) * r,
              p.sin(angle + a) * r
            );
          }
          p.endShape();
        }

        // Centre dot
        p.stroke(0, 0, 100, 90);
        p.strokeWeight(4);
        p.point(0, 0);
      }

      // ── Utility: hex → [h, s, b] ──────────────────────────────────────────────
      function hexToHSB(hex) {
        const r = parseInt(hex.slice(1, 3), 16) / 255;
        const g = parseInt(hex.slice(3, 5), 16) / 255;
        const b = parseInt(hex.slice(5, 7), 16) / 255;
        const max = Math.max(r, g, b);
        const min = Math.min(r, g, b);
        const diff = max - min;
        let h = 0;
        if (diff !== 0) {
          if (max === r) h = 60 * (((g - b) / diff) % 6);
          else if (max === g) h = 60 * ((b - r) / diff + 2);
          else h = 60 * ((r - g) / diff + 4);
        }
        if (h < 0) h += 360;
        const s = max === 0 ? 0 : (diff / max) * 100;
        return [h, s, max * 100];
      }

      // ── Interaction ───────────────────────────────────────────────────────────
      p.mousePressed = function () {
        paletteIdx = (paletteIdx + 1) % PALETTES.length;
        palette = PALETTES[paletteIdx];
      };

      p.windowResized = function () {
        SIZE = Math.min(p.windowWidth, p.windowHeight) * 0.85;
        p.resizeCanvas(SIZE, SIZE);
      };
    });
  </script>
</body>
</html>
